<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Snake Game | Classic Arcade</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Press Start 2P', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #0d1f12;
            border-radius: 48px;
            padding: 24px 24px 28px 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid #2e7d5e;
        }

        .game-panel {
            background: #071208;
            border-radius: 28px;
            padding: 16px;
            box-shadow: inset 0 0 8px #00000055, 0 8px 18px black;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 4px #2b5a42, 0 10px 25px rgba(0,0,0,0.3);
            background-color: #1b3b2b;
            cursor: pointer;
        }

        .info-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            margin-bottom: 8px;
            padding: 10px 18px;
            background: #0a1910;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            font-weight: bold;
        }

        .score-box, .high-box {
            background: #000000aa;
            padding: 8px 22px;
            border-radius: 40px;
            color: #b9fbc0;
            text-shadow: 0 0 4px #2eff7a;
            letter-spacing: 1px;
        }

        .score-box span, .high-box span {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f9f3c1, #d4ffb0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        .score-box label, .high-box label {
            font-size: 0.85rem;
            color: #9bcfb0;
            margin-right: 8px;
            font-weight: 600;
        }

        button {
            background: #2c5e3f;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 8px 28px;
            border-radius: 60px;
            color: #f3ffdd;
            cursor: pointer;
            transition: 0.15s linear;
            box-shadow: 0 4px 0 #0e2a18;
            letter-spacing: 1px;
        }

        button:hover {
            background: #3f8460;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #0e2a18;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0e2a18;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 12px;
            padding: 0 12px;
        }

        .tip {
            background: #00000066;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #c1e4cf;
            font-weight: 500;
        }

        .tip kbd {
            background: #1e2f24;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: bold;
            margin: 0 4px;
            font-size: 0.7rem;
            color: #f5ffb0;
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 14px;
            }
            .score-box span, .high-box span {
                font-size: 1.2rem;
            }
            button {
                padding: 5px 20px;
                font-size: 0.9rem;
            }
            .tip {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <canvas id="snakeCanvas" width="500" height="500"></canvas>
            <div class="info-area">
                <div class="score-box">
                    <label>🍎 SCORE</label>
                    <span id="scoreValue">0</span>
                </div>
                <div class="high-box">
                    <label>🏆 HIGH</label>
                    <span id="highScoreValue">0</span>
                </div>
            </div>
            <div class="controls-row">
                <button id="restartButton">🔄 NEW GAME</button>
                <div class="tip">
                    🎮 <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd>   |  <kbd>WASD</kbd>   |  <kbd>R</kbd> restart
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONFIGURATION ----------
        const GRID_SIZE = 20;        // 20x20 grid
        const CELL_SIZE = 25;         // px (500/20)
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
        const TICK_INTERVAL_MS = 130;  // game speed
        
        // DOM elements
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const highScoreSpan = document.getElementById('highScoreValue');
        const restartBtn = document.getElementById('restartButton');
        
        // ---------- GAME STATE ----------
        let snake = [];          // array of {x, y}
        let direction = 'RIGHT';    // current moving direction
        let nextDirection = 'RIGHT';
        let food = { x: 15, y: 12 };
        let score = 0;
        let highScore = 0;
        let playing = true;       // game active flag
        let gameInterval = null;
        let winFlag = false;       // for showing different message
        
        // ---------- HELPER FUNCTIONS ----------
        // load highscore from localStorage
        function loadHighScore() {
            const saved = localStorage.getItem('snakeHighScore');
            if (saved !== null && !isNaN(parseInt(saved))) {
                highScore = parseInt(saved);
            } else {
                highScore = 0;
            }
            highScoreSpan.innerText = highScore;
        }
        
        function updateHighScoreUI() {
            highScoreSpan.innerText = highScore;
        }
        
        // check and update highscore
        function updateHighScoreIfNeeded() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                updateHighScoreUI();
            }
        }
        
        // update score display
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        // get all free positions (cells not occupied by snake)
        function getFreeCells() {
            const occupied = new Set();
            for (let segment of snake) {
                occupied.add(`${segment.x},${segment.y}`);
            }
            const free = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (!occupied.has(`${i},${j}`)) {
                        free.push({ x: i, y: j });
                    }
                }
            }
            return free;
        }
        
        // generate random food avoiding snake body, returns true if success, false if no free cells (win)
        function generateRandomFood() {
            const freeCells = getFreeCells();
            if (freeCells.length === 0) {
                return false;   // no empty space → victory!
            }
            const randomIndex = Math.floor(Math.random() * freeCells.length);
            food = { ...freeCells[randomIndex] };
            return true;
        }
        
        // reset game fully
        function resetGame() {
            // kill ongoing interval
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            
            // initial snake: three cells in the middle
            const mid = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: mid, y: mid },
                { x: mid-1, y: mid },
                { x: mid-2, y: mid }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            playing = true;
            winFlag = false;
            updateScoreUI();
            
            // generate valid food (not on snake)
            const freeStart = getFreeCells();
            if (freeStart.length > 0) {
                const rand = Math.floor(Math.random() * freeStart.length);
                food = { ...freeStart[rand] };
            } else {
                // impossible on fresh start but fallback
                food = { x: 5, y: 5 };
            }
            
            // draw fresh board
            drawGame();
            
            // start new interval
            gameInterval = setInterval(gameTick, TICK_INTERVAL_MS);
        }
        
        // ------------- GAME OVER HANDLING -------------
        function endGame(isWin = false) {
            if (!playing) return;  // already ended
            playing = false;
            winFlag = isWin;
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            drawGame();  // show game over / win message on canvas
        }
        
        // ---------- COLLISION & MECHANICS ----------
        // check if position collides with snake body (optionally skip tail index if needed, but we use after update)
        function isSelfCollision(head, snakeArray) {
            // head collides with any segment of snakeArray (excluding potential head duplication? we compare)
            for (let i = 0; i < snakeArray.length; i++) {
                if (snakeArray[i].x === head.x && snakeArray[i].y === head.y) {
                    return true;
                }
            }
            return false;
        }
        
        // check wall collision
        function isWallCollision(head) {
            return head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE;
        }
        
        // main game logic (called each tick)
        function gameTick() {
            if (!playing) return;  // extra safety
            
            // apply queued direction if not opposite
            const oppositeMap = {
                'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
            };
            if (nextDirection && oppositeMap[nextDirection] !== direction) {
                direction = nextDirection;
            }
            
            // compute new head based on current direction
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.y += 1; break;
                case 'LEFT':  newHead.y -= 1; break;
                case 'UP':    newHead.x -= 1; break;
                case 'DOWN':  newHead.x += 1; break;
                default: break;
            }
            
            // check wall collision before any other action
            if (isWallCollision(newHead)) {
                endGame(false);
                drawGame();
                return;
            }
            
            // check if food is eaten
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            // --- simulate movement & body update ---
            if (willEat) {
                // EAT: insert new head at front, keep tail (no pop)
                const newSnake = [newHead, ...snake];
                snake = newSnake;
                // increase score
                score++;
                updateScoreUI();
                updateHighScoreIfNeeded();
                
                // generate new food
                const successFood = generateRandomFood();
                // if no free cells -> VICTORY !
                if (!successFood) {
                    // Perfect win: snake filled the board
                    endGame(true);
                    drawGame();
                    return;
                }
                
                // after eating, check self collision (new head could hit body? only if weird but new head is unique because food was not in snake)
                // but after adding head, we must ensure head didn't crash into existing body (except it's new cell that was free, but just in case extra check)
                // but because food was placed on empty cell, the new head cell was previously empty, so no self-collision. However, if something wrong skip
                // but we also check max win condition: if snake length == TOTAL_CELLS then game win
                if (snake.length === TOTAL_CELLS) {
                    endGame(true);
                    drawGame();
                    return;
                }
                
            } else {
                // NORMAL MOVE: insert new head, remove tail
                const newSnake = [newHead, ...snake.slice(0, -1)];
                snake = newSnake;
                // after move, verify self collision (new head might overlap body)
                if (isSelfCollision(snake[0], snake.slice(1))) {
                    endGame(false);
                    drawGame();
                    return;
                }
            }
            
            // re-check win condition after any move (just in case)
            if (snake.length === TOTAL_CELLS) {
                endGame(true);
                drawGame();
                return;
            }
            
            // redraw everything
            drawGame();
        }
        
        // ---------- GRAPHICS (canvas drawing) ----------
        function drawGame() {
            if (!ctx) return;
            // background grid & soft pattern
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // draw grid lines (light grid)
            ctx.strokeStyle = '#2e6a4a';
            ctx.lineWidth = 0.8;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // draw food (radiant berry)
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ff5252';
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff2a2a';
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffffbb';
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 2, food.y * CELL_SIZE + CELL_SIZE/2 - 2, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // draw snake (smooth gradient)
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const xPos = seg.x * CELL_SIZE;
                const yPos = seg.y * CELL_SIZE;
                const padding = i === 0 ? 2 : 3;
                const radius = 5;
                ctx.fillStyle = i === 0 ? '#94e67c' : '#3faa5a';
                ctx.shadowBlur = 2;
                ctx.shadowColor = '#96ffa6';
                ctx.beginPath();
                ctx.roundRect(xPos + 1, yPos + 1, CELL_SIZE - 2, CELL_SIZE - 2, radius);
                ctx.fill();
                // eyes for head
                if (i === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(xPos + CELL_SIZE - 8, yPos + 8, 3, 0, Math.PI*2);
                    ctx.arc(xPos + 8, yPos + 8, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#0a2f1a';
                    ctx.beginPath();
                    ctx.arc(xPos + CELL_SIZE - 7, yPos + 7, 1.5, 0, Math.PI*2);
                    ctx.arc(xPos + 9, yPos + 7, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
            
            // if game over or win overlay
            if (!playing) {
                ctx.font = 'bold 24px "Segoe UI", "Courier New", monospace';
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = winFlag ? '#f6ffb0' : '#ffcf9a';
                ctx.font = 'bold 26px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const message = winFlag ? '✨ YOU WIN! ✨' : '💀 GAME OVER 💀';
                ctx.fillStyle = winFlag ? '#c6ff87' : '#ffa75c';
                ctx.shadowColor = '#000000';
                ctx.fillText(message, canvas.width/2, canvas.height/2 - 15);
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = '#ddeeff';
                ctx.fillText('press NEW GAME', canvas.width/2, canvas.height/2 + 30);
                ctx.textAlign = 'left';
            }
            
            // optional: show current score on canvas corner
            ctx.font = 'bold 14px "Courier New"';
            ctx.fillStyle = '#ebffdd';
            ctx.shadowBlur = 2;
            ctx.fillText(`🍎 ${score}`, 12, 28);
        }
        
        // helper: canvas rounded rect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ---------- KEYBOARD CONTROLS ----------
        function handleKeydown(e) {
            const key = e.key;
            // restart with R / r key
            if (key === 'r' || key === 'R') {
                e.preventDefault();
                resetGame();
                return;
            }
            
            if (!playing) return;   // no direction change if game over
            
            let newDir = null;
            // arrow keys + WASD
            if (key === 'ArrowUp' || key === 'w' || key === 'W') newDir = 'UP';
            else if (key === 'ArrowDown' || key === 's' || key === 'S') newDir = 'DOWN';
            else if (key === 'ArrowLeft' || key === 'a' || key === 'A') newDir = 'LEFT';
            else if (key === 'ArrowRight' || key === 'd' || key === 'D') newDir = 'RIGHT';
            
            if (newDir) {
                e.preventDefault();
                // prevent opposite direction relative to current direction (not nextDirection, but immediate safety)
                const opposite = {
                    'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
                };
                if (opposite[newDir] !== direction) {
                    nextDirection = newDir;
                }
            }
        }
        
        // ---------- INITIALIZATION ----------
        function init() {
            loadHighScore();
            resetGame();      // sets snake, food, interval, draws
            window.addEventListener('keydown', handleKeydown);
            restartBtn.addEventListener('click', () => {
                resetGame();
            });
            // optional: touch/mobile friendly: prevent canvas contextmenu
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        // start everything
        init();
    })();
</script>
</body>
</html>
